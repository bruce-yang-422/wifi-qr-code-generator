<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" stop-color="#6EB5FF"/>
      <stop offset="100%" stop-color="#1E7FFF"/>
    </linearGradient>
  </defs>

  <!-- Background with gradient -->
  <rect width="512" height="512" rx="120" fill="url(#bgGradient)"/>

  <!-- Main container (rounded square background) -->
  <rect x="80" y="80" width="352" height="352" rx="80" fill="rgba(255, 255, 255, 0.15)" stroke="rgba(255, 255, 255, 0.3)" stroke-width="2"/>

  <!-- Top-left QR locator (white frame) -->
  <rect x="120" y="120" width="100" height="100" rx="16" fill="white" fill-opacity="0.9"/>
  <!-- Top-left QR locator (inner blue) -->
  <rect x="140" y="140" width="60" height="60" rx="10" fill="#2979FF"/>
  <!-- Top-left QR locator (center white) -->
  <rect x="156" y="156" width="28" height="28" rx="4" fill="white"/>

  <!-- Top-right QR locator (white frame) -->
  <rect x="292" y="120" width="100" height="100" rx="16" fill="white" fill-opacity="0.9"/>
  <!-- Top-right QR locator (inner blue) -->
  <rect x="312" y="140" width="60" height="60" rx="10" fill="#2979FF"/>
  <!-- Top-right QR locator (center white) -->
  <rect x="328" y="156" width="28" height="28" rx="4" fill="white"/>

  <!-- Bottom-left QR locator (white frame) -->
  <rect x="120" y="292" width="100" height="100" rx="16" fill="white" fill-opacity="0.9"/>
  <!-- Bottom-left QR locator (inner blue) -->
  <rect x="140" y="312" width="60" height="60" rx="10" fill="#2979FF"/>
  <!-- Bottom-left QR locator (center white) -->
  <rect x="156" y="328" width="28" height="28" rx="4" fill="white"/>

  <!-- WiFi symbol center -->
  <!-- WiFi curves -->
  <path d="M 222 268 Q 256 238 290 268" stroke="white" stroke-width="18" stroke-linecap="round" fill="none" opacity="0.95"/>
  <path d="M 244 310 Q 256 296 268 310" stroke="white" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.95"/>
  
  <!-- WiFi dot -->
  <circle cx="256" cy="350" r="14" fill="white" opacity="0.95"/>

  <!-- QR data modules (right-center area) -->
  <g fill="white" opacity="0.85">
    <rect x="280" y="280" width="16" height="16" rx="3"/>
    <rect x="310" y="280" width="16" height="16" rx="3"/>
    <rect x="280" y="310" width="16" height="16" rx="3"/>
    <rect x="340" y="310" width="16" height="16" rx="3"/>
    <rect x="310" y="340" width="16" height="16" rx="3"/>
  </g>
</svg>
